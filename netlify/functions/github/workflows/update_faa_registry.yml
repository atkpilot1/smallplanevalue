name: Update FAA Aircraft Registry

on:
  schedule:
    # Every Sunday at 2:00 AM Central (7:00 AM UTC)
    - cron: '0 7 * * 0'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  update-registry:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Download and import FAA registry
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python .github/scripts/update_faa_registry.py
